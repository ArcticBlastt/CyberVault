<!DOCTYPE html>
<html>
<head>
<title>Password Vault</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Orbitron', sans-serif;
}

body{
min-height:100vh;
background:#020617;
color:white;
padding:40px;
}

.back-btn{
position:absolute;
top:20px;
left:20px;
color:#00ffff;
text-decoration:none;
font-size:14px;
opacity:0.8;
transition:0.2s;
}

.back-btn:hover{
opacity:1;
text-shadow:0 0 8px #00ffff;
}

.dashboard{
max-width:1000px;
margin:auto;
padding:50px;
border-radius:20px;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(20px);
border:1px solid rgba(0,255,255,0.25);
box-shadow:0 0 30px rgba(0,255,255,0.2);
}

.title{
font-size:36px;
letter-spacing:3px;
margin-bottom:10px;
color:#00ffff;
text-shadow:0 0 10px #00ffff;
text-align:center;
}

.subtitle{
font-size:13px;
opacity:0.7;
margin-bottom:40px;
text-align:center;
}

.card{
padding:20px;
border-radius:15px;
background:rgba(255,255,255,0.05);
border:1px solid rgba(0,255,255,0.25);
box-shadow:0 0 15px rgba(0,255,255,0.15);
margin-bottom:30px;
}

.card input{
width:100%;
padding:10px;
margin-top:10px;
border-radius:10px;
border:none;
background:rgba(255,255,255,0.1);
color:white;
}

.card button{
margin-top:15px;
padding:10px 20px;
border:none;
border-radius:20px;
background:linear-gradient(90deg,#00ffff,#0066ff);
color:white;
cursor:pointer;
}

.card button:hover{
box-shadow:0 0 20px #00ffff;
}

.password-list{
margin-top:20px;
}

.password-list li{
padding:10px 0;
border-bottom:1px solid rgba(255,255,255,0.1);
}

</style>

</head>

<body>

<a href="/dashboard" class="back-btn">Back</a>

<div class="dashboard">

<h1 class="title">Password Vault</h1>
<p class="subtitle">Securely store your credentials</p>

<div class="card">

<h3>Add New Password</h3>

<form method="POST" action="/add_password">

<input type="text" name="website" placeholder="Website" required>

<input type="text" name="username" placeholder="Username" required>

<input type="text" name="password" placeholder="Password" required>

<button type="submit">Save Password</button>

</form>

</div>

<div class="card">

<h3>Stored Passwords</h3>

<ul class="password-list">

{% for p in passwords %}
<li>
<strong>{{p.website}}</strong> | {{p.username}} | {{p.password}}
</li>
{% endfor %}

</ul>

</div>

</div>

</body>
</html>
